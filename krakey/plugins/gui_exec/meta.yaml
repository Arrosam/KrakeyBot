name: gui_exec
description: >
  Perform a GUI operation (click / right_click / double_click /
  drag / type / key / screenshot) in a target Environment by
  serializing the action into a ``pyautogui`` Python snippet and
  dispatching as ``[python, "-c", snippet]`` to env.run. Self picks
  the env per call (``env`` parameter); the plugin must be
  allow-listed in ``config.environments.<env>.allowed_plugins``.
  The target env's Python interpreter must have ``pyautogui``
  installed. No inner LLM.

config_schema:
  - field: python_cmd
    type: text
    default: python
    help: >
      Sandbox-side Python interpreter name (or absolute path)
      that the tool dispatches pyautogui snippets to. For
      ``env: "local"`` the plugin always uses the krakey
      runtime's own interpreter (``sys.executable``) so a
      ``krakey install`` venv works without further config.
      This field only kicks in for ``env: "sandbox"`` calls.
      Default works on most distros that keep a ``python``
      symlink; set to ``python3`` (or an absolute path) on
      minimal Linux guests that ship only ``python3``.

dependencies:
  # ``pyautogui`` is needed in the env's Python (where the snippet
  # runs), not just in the host. ``krakey install`` adds it to the
  # current Python — operators using a separate venv inside a
  # sandbox must install it there too.
  - "pyautogui>=0.9"

components:
  - kind: tool
    factory_module: krakey.plugins.gui_exec.tool
    factory_attr: build_tool
