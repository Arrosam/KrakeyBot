name: bootstrap
description: |
  First-boot self-awareness: injects GENESIS.md into Self's prompt
  high (above DNA), parses [NOTE] for self-model patches, and
  auto-completes once Self has set both identity.name and
  identity.persona — at which point the plugin removes itself from
  the central config.yaml so it won't run on the next start.

  Re-enable from the dashboard's Plugins panel to re-bootstrap.

  No LLM purposes — the modifier is structural. GENESIS path is
  configurable via the per-plugin config.yaml; default points at
  workspace/GENESIS.md.

components:
  - kind: modifier
    role: bootstrap
    factory_module: krakey.plugins.bootstrap.modifier
    factory_attr: build_modifier

config_schema:
  - field: genesis_path
    type: text
    default: workspace/GENESIS.md
    help: |
      Path to the GENESIS.md the modifier reads on first prompt build.
      Missing file → built-in placeholder so Self still boots.
