<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Krakey Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="brand">
      <img class="brand-logo" src="/static/logo.png" alt=""
           onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'brand-logo placeholder',textContent:'K'}))">
      <div class="brand-text">
        <div class="brand-name">KrakeyBot</div>
        <div class="brand-tag">digital being</div>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="thoughts"><i data-bi="chat-square-text"></i> Inner Thoughts</button>
      <button class="tab-btn" data-tab="chat"><i data-bi="chat-dots"></i> Chat</button>
      <button class="tab-btn" data-tab="memory"><i data-bi="cpu"></i> Memory</button>
      <button class="tab-btn" data-tab="prompts"><i data-bi="journal-text"></i> Prompts</button>
      <button class="tab-btn" data-tab="settings"><i data-bi="gear"></i> Settings</button>
    </nav>
    <div class="status-bar" id="status-bar">— connecting —</div>
  </header>

  <main>
    <!-- @@view:thoughts@@ -->

    <!-- @@view:prompts@@ -->

    <!-- @@view:chat@@ -->

    <!-- @@view:memory@@ -->

    <!-- @@view:settings@@ -->
  </main>

  <script src="/static/shared/bi.js"></script>
  <!-- Cytoscape powers the Memory tab's graph browser (pan/zoom/drag).
       Same CDN+version pinning the docs/ arch-graph tool uses, so the
       dependency story is consistent across the project. Load failure
       is handled gracefully in app.js (the Graph view shows a hint
       and the table views still work). -->
  <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
