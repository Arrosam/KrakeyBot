    <!-- SETTINGS -->
    <section id="tab-settings" class="tab-panel">
      <p class="hint">Edit config.yaml through this form. Hover over a
        field name to see its help text. Saved changes only take effect
        after a manual restart; every startup auto-backs up the previous
        config to <code>workspace/backups/</code>.</p>
      <div id="settings-form" class="scroll">— loading —</div>
      <div class="settings-actions">
        <button id="settings-save"><i data-bi="floppy"></i> Save</button>
        <button id="settings-restart" class="danger"><i data-bi="arrow-clockwise"></i> Restart Krakey</button>
        <span id="settings-toast"></span>
      </div>
    </section>
