    <!-- SETTINGS -->
    <section id="tab-settings" class="tab-panel">
      <p class="hint">Edit config.yaml through this form. Hover over a
        field name to see its help text. Saved changes only take effect
        after a manual restart; every startup auto-backs up the previous
        config to <code>workspace/backups/</code>.</p>
      <!-- Install banner. Hidden by default; shown when
           /api/plugins/deps_status reports pending. Self also gets a
           Stimulus on startup (see krakey/runtime/builtin_tools/
           install_tool.py) so she can self-repair, but the banner is
           the operator-facing surface for "I just enabled a plugin and
           need its deps". -->
      <div id="install-banner" class="install-banner" hidden>
        <span class="install-banner-text" id="install-banner-text"></span>
        <button id="install-run" class="primary">
          <i data-bi="download"></i> Install
        </button>
        <label class="install-banner-upgrade">
          <input type="checkbox" id="install-upgrade">
          <span>--upgrade</span>
        </label>
      </div>
      <pre id="install-log" class="install-log scroll" hidden></pre>
      <div id="settings-form" class="scroll">— loading —</div>
      <div class="settings-actions">
        <button id="settings-save"><i data-bi="floppy"></i> Save</button>
        <!-- Apply changes WITHOUT restarting: tries to hot-reload
             newly-enabled plugins. Bigger changes (LLM swap,
             memory backend, plugin REMOVAL) still need the
             Restart button. The endpoint reports back which
             plugins are still pending removal so the toast
             tells the operator. -->
        <button id="settings-apply" title="Hot-add newly enabled plugins without process restart"><i data-bi="arrow-repeat"></i> Apply changes</button>
        <button id="settings-restart" class="danger"><i data-bi="arrow-clockwise"></i> Restart Krakey</button>
        <span id="settings-toast"></span>
      </div>
    </section>
