    <!-- CHAT -->
    <section id="tab-chat" class="tab-panel">
      <div class="chat-meta" id="chat-meta">— connecting —</div>
      <div id="chat-history"></div>
      <div id="chat-attachments"></div>
      <form id="chat-form" autocomplete="off">
        <button type="button" id="chat-attach-btn" title="Attach image / file"><i data-bi="paperclip"></i></button>
        <input type="file" id="chat-file" multiple hidden />
        <textarea id="chat-input" rows="1" placeholder="Say something to Krakey... (Enter to send, Shift+Enter for newline)"></textarea>
        <button type="submit" id="chat-send-btn">Send</button>
      </form>
    </section>
