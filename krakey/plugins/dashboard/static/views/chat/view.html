    <!-- CHAT -->
    <section id="tab-chat" class="tab-panel">
      <div class="chat-meta" id="chat-meta">— connecting —</div>
      <div id="chat-history"></div>
      <div id="chat-attachments"></div>
      <form id="chat-form" autocomplete="off">
        <button type="button" id="chat-attach-btn" title="Attach image / file" data-i18n-title="chat_attach_title"><i data-bi="paperclip"></i></button>
        <input type="file" id="chat-file" multiple hidden />
        <textarea id="chat-input" rows="1" placeholder="Say something to Krakey... (Enter to send, Shift+Enter for newline)" data-i18n-ph="chat_placeholder"></textarea>
        <button type="submit" id="chat-send-btn" data-i18n="btn_send">Send</button>
      </form>
    </section>
