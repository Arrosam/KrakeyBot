    <!-- INNER THOUGHTS -->
    <section id="tab-thoughts" class="tab-panel active">
      <div class="thoughts-grid">
        <div class="panel cyan">
          <h3>Thinking (inner monologue)</h3>
          <div class="scroll" id="thinking-stream"></div>
        </div>
        <div class="panel magenta">
          <h3>Decision</h3>
          <div class="scroll" id="decision-stream"></div>
        </div>
      </div>
      <div class="thoughts-grid">
        <!-- Tool Usage replaces the old "Hypothalamus (dispatch)"
             panel. Each beat logs dispatch (chevron-right icon),
             tool result (chevron-left), idle interval (stopwatch),
             and sleep boundaries (moon / sunrise) so the user has
             a full per-beat record of what Krakey did with her
             decisions, not just a count. All icons flow through
             window.biIcon — no emoji per repo memo. -->
        <div class="panel yellow">
          <h3>Tool Usage</h3>
          <div class="scroll small" id="tool-stream"></div>
        </div>
        <!-- Bottom-right cell is split: Stimulus on top, live Status
             below. The Stimulus panel groups every received stimulus
             under the heartbeat that drained it — replaces the old
             "Pending Stimuli" snapshot (which never quite worked
             since the snapshot was post-drain). Status renders GM
             counts, fatigue, heartbeat id, sleep bookkeeping —
             what the top status-bar already tracks but in a
             persistent readable block inside the Inner Thoughts
             view. -->
        <div class="thoughts-bottom-right">
          <div class="panel white">
            <h3>Stimulus</h3>
            <div class="scroll small" id="stim-stream"></div>
          </div>
          <div class="panel">
            <h3>Status (runtime state)</h3>
            <dl id="status-panel" class="scroll small status-dl"></dl>
          </div>
        </div>
      </div>
    </section>
