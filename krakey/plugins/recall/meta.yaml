name: recall
description: >
  Self-driven explicit memory recall. Provides the `memory_recall` Tool
  that lets Self drill into GM nodes she's noticed (including KB index
  nodes that lead her into a specific KnowledgeBase). Per-beat
  auto-recall is now the RecallEngine's job and lives outside this
  plugin.

config_schema:
  - field: default_top_k
    type: number
    default: 8
    help: >
      Default top-K for the explicit memory_recall tool when Self
      doesn't pass `top_k` in arguments.

components:
  - kind: tool
    factory_module: krakey.plugins.recall.tool
    factory_attr: build_tool
