name: telegram
description: >
  Telegram bidirectional channel: incoming messages arrive as
  user_message stimuli; Krakey replies via telegram_reply. Channel +
  tool share one HttpTelegramClient instance via
  ``ctx.plugin_cache``.
config_schema:
  - field: bot_token
    type: password
    default: ""
    help: >
      BotFather token. Use ${ENV_VAR} to pull from the environment at
      load time.
  - field: allowed_chat_ids
    type: text
    default: ""
    help: >
      Comma-separated chat IDs the channel will accept. Empty = allow
      any.
  - field: default_chat_id
    type: text
    default: ""
    help: >
      Chat ID the reply tool sends to when no chat_id is specified
      in the tool call.
components:
  - kind: channel
    factory_module: krakey.plugins.telegram
    factory_attr: build_channel
  - kind: tool
    factory_module: krakey.plugins.telegram
    factory_attr: build_tool
