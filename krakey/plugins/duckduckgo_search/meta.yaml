name: duckduckgo_search
description: >
  Web search via DuckDuckGo (ddgs library). Tool name is "search"
  — Self addresses it by the abstract verb. The plugin name carries
  the backend identity so a future plugin can ship a different
  search provider claiming the same tool name.
config_schema:
  - field: max_results
    type: number
    default: 5
    help: >
      Default result count when Self doesn't pass ``max_results`` in the
      tool call. Self can override per-call (up to a hard cap of 25);
      this just sets the no-argument default.
dependencies:
  - "ddgs>=9.0"
components:
  - kind: tool
    factory_module: krakey.plugins.duckduckgo_search
    factory_attr: build_tool
