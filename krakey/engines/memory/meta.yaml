slot: memory
description: |
  Unified GM CRUD + KB management + sleep cycle. Default impl
  extends a bundled GraphMemory class (at
  krakey.engines.memory._internal.graph_memory) with KB management
  methods (delegating to an internal KBRegistry) and a sleep_cycle
  method (wrapping the enter_sleep_mode pipeline under
  _internal/sleep/). The MemoryEngine Protocol lives at
  krakey.interfaces.engines.memory and is a single flat surface so
  the runtime treats memory as one swappable component.

builtin_engines:
  - name: graph_memory
    factory_module: krakey.engines.memory.default
    factory_attr: GraphMemoryEngine
    default: true
    description: |
      SQLite-backed graph memory + per-topic KB SQLite files +
      enter_sleep_mode consolidation pipeline.

  - name: memos
    factory_module: krakey.engines.memory.memos
    factory_attr: MemOSMemoryEngine
    description: |
      MemOS (MOS) adapter. Ingest -> MOS.add; text retrieval -> MOS.search;
      KB fleet -> per-topic MemCubes. Graph edges, raw-vector search, sleep,
      and category counts are stubbed (MemOS consolidates internally and
      retrieves by text). Pair with core_implementations.recall: memos.
      Requires the external 'MemoryOS' PyPI package + a MemOS config file —
      auto-installed by `krakey install` when this engine is selected.
    dependencies:
      - "MemoryOS>=2.0.17,<3.0"
    config_schema:
      - field: mos_config_path
        type: string
        default: ""
        help: >
          Filesystem path to a MemOS config JSON/YAML (MOSConfig.from_json_file).
          REQUIRED when this engine is selected.
      - field: user_id
        type: string
        default: "krakey"
        help: MemOS user id namespacing all memory operations.
      - field: mem_cube_id
        type: string
        default: "krakey_main"
        help: Id of the primary MemCube used for working-memory ingest/recall.
      - field: mem_cube_path
        type: string
        default: ""
        help: >
          Optional filesystem path to register the primary MemCube from.
          When empty, the cube is registered by mem_cube_id alone.