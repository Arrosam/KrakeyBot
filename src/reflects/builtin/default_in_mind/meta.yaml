name: default_in_mind
kind: in_mind
description: >
  Persistent "in-mind" state — three short fields (thoughts / mood /
  focus) that Self maintains across heartbeats to declare what's
  currently at the front of its mental workspace. Self updates them
  via the ``update_in_mind`` tentacle (registered automatically by
  this Reflect on attach). The current state is injected into every
  Self prompt as a virtual ``Heartbeat #now (in mind)`` round at the
  head of [HISTORY], plus a constant [IN MIND — 操作约束] layer that
  reminds Self to call update_in_mind whenever any of the three
  things change. Replaces the deleted self_model state.focus_topic /
  state.mood_baseline / goals.active fields with a Self-authored,
  prompt-resident, self-correcting equivalent.
factory_module: src.reflects.builtin.default_in_mind.reflect
factory_attr: build_reflect
config_schema: []
