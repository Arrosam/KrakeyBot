name: default_recall_anchor
kind: recall_anchor
description: >
  Scripted vec_search + weighted-merge recall. Produces the per-beat
  IncrementalRecall instance that drives the [GRAPH MEMORY] prompt
  layer. No LLM in the recall path — fast, deterministic, free of
  extra round-trips. Without this Reflect (or any other recall_anchor
  Reflect) registered, Self's [GRAPH MEMORY] layer is always empty,
  which works but loses the agent's working memory benefits.
factory_module: src.reflects.builtin.default_recall_anchor.reflect
factory_attr: build_reflect
config_schema: []
