name: default_in_mind
description: >
  Persistent "in-mind" state — three short fields (thoughts / mood /
  focus) that Self maintains across heartbeats to declare what's
  currently at the front of its mental workspace. Self updates them
  via the `update_in_mind` tentacle (this plugin contributes BOTH
  the reflect that owns the state AND the tentacle that mutates it).
  The current state is injected into every Self prompt as a virtual
  "Heartbeat #now (in mind)" round at the head of [HISTORY], plus a
  constant [IN MIND — 操作约束] standing instruction layer that
  reminds Self to call update_in_mind whenever any of the three things
  change. Replaces the deleted self_model.state.focus_topic /
  state.mood_baseline / goals.active fields.

config_schema: []

components:
  - kind: reflect
    sub_kind: in_mind
    factory_module: src.plugins.builtin.default_in_mind.reflect
    factory_attr: build_reflect
  # The update_in_mind tentacle is registered by the reflect's
  # attach() hook (it needs a back-reference to the reflect instance
  # to call its update() method). Listing the tentacle separately
  # here would create two registrations, so we leave it out — but
  # the description above documents that the tentacle is part of the
  # plugin's surface.
