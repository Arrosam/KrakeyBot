name: memory_recall
description: >
  Active recall of GM nodes (and, via KB index nodes, their KB
  entries). Self dispatches this when she wants to reflect or dig
  into past learning.
config_schema:
  - field: default_top_k
    type: number
    default: 8
    help: >
      Default number of top-K nodes to return when Self doesn't specify.
components:
  - kind: tentacle
    factory_module: src.plugins.builtin.memory_recall
    factory_attr: build_tentacle
