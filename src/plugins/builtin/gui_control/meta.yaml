name: gui_control
description: >
  Drive a desktop (click / type / press / screenshot). Disabled by
  default; enable only when you want Krakey operating a visible
  display. PyAutoGUI's built-in fail-safe (slam mouse to top-left
  corner) is left on — abort any time.
config_schema:
  - field: sandbox
    type: bool
    default: true
    help: >
      Reserved for Phase S2; currently ignored (always runs on host
      PyAutoGUI).
  - field: screenshot_dir
    type: text
    default: workspace/screenshots
components:
  - kind: tentacle
    factory_module: src.plugins.builtin.gui_control
    factory_attr: build_tentacle
