name: coding
description: >
  Execute a Python or shell command and return exit code + stdout /
  stderr. Routes through the sandbox VM when `sandbox: true`
  (default). With `sandbox: false` it's NOT a real sandbox — the
  subprocess inherits the parent's privileges. Real isolation
  requires the sandbox VM (configure the top-level `sandbox:`
  block).
config_schema:
  - field: sandbox
    type: bool
    default: true
    help: >
      When true, exec runs via the sandbox guest agent. Set to false
      only on trusted hosts.
  - field: sandbox_dir
    type: text
    default: workspace/sandbox
    help: Working directory hint passed to the runner.
  - field: timeout_seconds
    type: number
    default: 30
    help: Subprocess timeout. Exceeding it returns exit=124.
  - field: max_output_chars
    type: number
    default: 4000
    help: Truncate stdout/stderr at this length to keep stimuli compact.
components:
  - kind: tentacle
    factory_module: src.plugins.builtin.coding
    factory_attr: build_tentacle
