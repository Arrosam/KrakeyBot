[pytest]
# Pytest discovers tests under:
#   tests/                      — cross-cutting integration tests
#   krakey/engines/*/tests/     — per-engine colocated tests
#   krakey/engine_system/tests/ — engine loader tests
#   krakey/plugins/*/tests/     — per-plugin colocated tests
# Each entry corresponds to a self-contained component owning its
# test suite — drop a folder, the rest of the suite keeps working.
testpaths =
    tests
    krakey
asyncio_mode = auto
pythonpath = .
# ``--import-mode=importlib`` ensures pytest imports colocated test
# files under their full dotted package name (e.g.
# ``krakey.engines.embedder.tests.test_embedder_slot``) rather than
# inferring a shorter rooted-from-testpath name (e.g.
# ``embedder.tests.test_embedder_slot``). Important when a test file
# defines classes the runtime later resolves via the same dotted
# path through ``importlib.import_module`` — without identity-stable
# module names, ``isinstance`` checks fail because the test sees one
# copy of the class and the runtime sees another.
addopts = --import-mode=importlib
